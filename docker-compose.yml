version: '3.8'

services:
  # Service Discovery
  eureka-server:
    build: ./eureka-server
    ports:
      - '8761:8761'
    networks:
      - ecom-network
    restart: always

  # Configuration Server
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - '8888:8888'
    networks:
      - ecom-network
    restart: always

  # User Service
  user-service:
    build: ./user-service
    ports:
      - '8050:8050'
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/ecomuserms?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
    networks:
      - ecom-network
    restart: always

  # Product Service
  product-service:
    build: ./product-service
    ports:
      - '8051:8051'
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/ecomproductms?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
    networks:
      - ecom-network
    restart: always

  # Inventory Service
  inventory-service:
    build: ./inventory-service
    ports:
      - '8082:8082'
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/inventory_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
    networks:
      - ecom-network
    restart: always

  # Cart Service
  cart-service:
    build: ./cart-service
    ports:
      - '8052:8052'
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/ecomcartms?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
    networks:
      - ecom-network
    restart: always

  # Favourite Service
  favourite-service:
    build: ./favourite-service
    ports:
      - '8056:8056'
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/ecomfavouritems?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
    networks:
      - ecom-network
    restart: always

  # Order Service
  order-service:
    build: ./order-service
    ports:
      - '8053:8053'
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/ecomorderms?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
    networks:
      - ecom-network
    restart: always

  # Payment Service
  payment-service:
    build: ./payment-service
    ports:
      - '8054:8054'
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/ecompaymentms?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
    networks:
      - ecom-network
    restart: always

  # Shipping Service
  shipping-service:
    build: ./shipping-service
    ports:
      - '8055:8055'
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/ecomshippingms?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
    networks:
      - ecom-network
    restart: always

